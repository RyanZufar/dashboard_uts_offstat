<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Jateng</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100">

  <!-- HERO -->
  <header class="hero">
    <img src="assets/images/hero1.png" class="hero-img active" id="img1">
    <img src="assets/images/hero2.png" class="hero-img" id="img2">

    <div class="overlay"></div>

    <div class="hero-content">
      <h1 class="text-4xl md:text-6xl font-bold">
        Dashboard Ketenagakerjaan Jawa Tengah
      </h1>
      <p class="mt-3 text-lg">
        Ringkasan statistik berdasarkan data terbaru
      </p>
    </div>
  </header>

  <!-- CONTENT -->
  <section class="container mx-auto px-6 py-10">

    <!-- CARDS -->
    <div id="cards" class="grid md:grid-cols-4 gap-6 mb-10"></div>

    <!-- CHARTS -->
    <div class="grid md:grid-cols-2 gap-8">

      <div class="chart-box">
        <canvas id="chartPengangguran"></canvas>
      </div>

      <div class="chart-box">
        <canvas id="chartUmur"></canvas>
      </div>

      <div class="chart-box">
        <canvas id="chartUpah"></canvas>
      </div>

      <div class="chart-box">
        <canvas id="chartGender"></canvas>
      </div>

    </div>

  </section>

  <script src="js/dashboard.js"></script>
</body>
</html>
